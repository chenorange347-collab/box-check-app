<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>箱号扫码核销</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#f5f5f5;padding:10px}
h2{text-align:center;margin:10px 0}
#reader{width:100%;max-width:500px;margin:0 auto}
.btns{text-align:center;margin:15px 0}
button{padding:10px 16px;font-size:16px;margin:0 5px}
#result{text-align:center;font-size:18px;margin:10px;color:green;font-weight:bold}
#list{max-width:500px;margin:0 auto;background:#fff;padding:10px;border-radius:8px}
.item{padding:8px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<h2>箱号扫码核销</h2>
<div id="reader"></div>
<div id="result"></div>
<div class="btns">
<button id="importBtn">导入Excel</button>
<button id="clearBtn">清空记录</button>
</div>
<div id="list"></div>

<input type="file" id="fileInput" accept=".xlsx" style="display:none">

<script>
let codeSet=new Set();
let listEl=document.getElementById('list');
let resultEl=document.getElementById('result');

// 扫码
let reader=new Html5Qrcode("reader");
reader.start({facingMode:"environment"},{
fps:10,qrbox:250
},onScanSuccess).catch(e=>alert("摄像头无法打开："+e));

function onScanSuccess(decodedText){
reader.pause();
if(codeSet.has(decodedText)){
resultEl.textContent="已核销："+decodedText;
resultEl.style.color="orange";
}else{
codeSet.add(decodedText);
resultEl.textContent="核销成功："+decodedText;
resultEl.style.color="green";
addItem(decodedText);
}
setTimeout(()=>reader.resume(),1500);
}

function addItem(text){
let div=document.createElement('div');
div.className='item';
div.textContent=text;
listEl.appendChild(div);
}

// 导入Excel
document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=event=>{
let b=new Uint8Array(event.target.result);
let wb=XLSX.read(b,{type:'array'});
let first=wb.SheetNames[0];
let arr=XLSX.utils.sheet_to_json(wb.Sheets[first]);
arr.forEach(row=>{
let code=String(row['箱号']||'').trim();
if(code&&!codeSet.has(code)){
codeSet.add(code);
addItem(code);
}
});
alert("导入完成，共"+arr.length+"条");
};
r.readAsArrayBuffer(f);
};

// 清空
document.getElementById('clearBtn').onclick=()=>{
codeSet.clear();
listEl.innerHTML='';
resultEl.textContent='';
};
</script>
</body>
</html>
